<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Automóvil Tech | Catálogo</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:#f4f6f9;color:#1c2733}
header{background:linear-gradient(135deg,#0b1f33,#14507a);color:#fff;padding:22px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:1.6rem} header .logo span{color:#f5b301} header .status{font-size:.8rem}
.filtros{max-width:1200px;margin:24px auto 0;padding:0 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filtros select,.filtros button{padding:9px 14px;border-radius:8px;border:1px solid #cbd5e0;background:#fff;font-size:.9rem;cursor:pointer}
.filtros button{background:#14507a;color:#fff;border:none}
.grid{max-width:1200px;margin:20px auto 60px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.card .banner{height:120px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#14507a,#2a86c0);color:#fff;font-size:2.4rem}
.card .body{padding:16px} .card h3{font-size:1.05rem;margin-bottom:4px}
.card .marca{color:#f5b301;font-weight:600;font-size:.8rem;text-transform:uppercase}
.card .precio{font-size:1.25rem;font-weight:700;color:#0b1f33;margin:8px 0}
.card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.card .tag{font-size:.72rem;background:#eef2f7;padding:3px 8px;border-radius:20px;color:#47576b}
.card .stock{font-size:.75rem;margin-top:8px;color:#2a8f5f}.card .stock.bajo{color:#c0392b}
footer{text-align:center;padding:24px;color:#7a8a9a;font-size:.8rem}
#msg{max-width:1200px;margin:20px auto;padding:0 20px;color:#c0392b}
</style></head><body>
<header><div class="logo"><h1>Automóvil<span>Tech</span> 🚗</h1></div>
<div class="status" id="status">Conectando...</div></header>
<div class="filtros">
<label>Marca: <select id="filtroMarca"><option value="">Todas</option></select></label>
<label>Categoría: <select id="filtroCategoria"><option value="">Todas</option>
<option>Sedán</option><option>SUV</option><option>Camioneta</option><option>Hatchback</option><option>City Car</option></select></label>
<button onclick="cargarVehiculos()">Filtrar</button></div>
<div id="msg"></div><div class="grid" id="catalogo"></div>
<footer>© 2025 Automóvil Tech — Migrado a AWS (EC2 · ECR · RDS · ALB · ASG)</footer>
<script src="app.js"></script></body></html>
